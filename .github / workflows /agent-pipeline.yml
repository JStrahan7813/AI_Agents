name: Generic Dynamic AI Agent Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code Base
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js Context
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Build Local Workspace Project Structure
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @playwright/test
        npx playwright install --with-deps

    - name: 🔮 Step 1: Execute First Agent with Ephemeral Runtime Secrets
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
      run: |
        echo "Creating dynamic temporary configurations in memory..."
        
        MOCK_SYS_HASH=$(echo -n "${{ github.sha }}-${{ github.run_id }}" | sha256sum | head -c 32)
        echo "Generated Ephemeral Pipeline Token Reference: ${MOCK_SYS_HASH}"
        
        NODE_ENV=production \
        MCP_PACKAGE_TARGET="@azure-devops/mcp" \
        AGENT_TARGET_ORG="https://dev.azure.com/DynamicOrg-${{ github.run_id }}" \
        AGENT_SECURITY_KEY="tmp_token_${MOCK_SYS_HASH}" \
        node .github/scripts/execute-generic-agent.js .github/agents/test_scripter.agent.md

    - name: 🛠️ Step 2: Execute Second Sequential Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "Running downstream verification sequence..."
        
        NODE_ENV=production \
        AGENT_SYSTEM_SCOPE="local-refactor-mode" \
        node .github/scripts/execute-generic-agent.js .github/agents/test_fixer.agent.md

    - name: 🎭 Step 3: Run Playwright Native Verification Tests
      run: |
        npx playwright test --reporter=list
