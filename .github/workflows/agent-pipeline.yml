name: Generic Dynamic AI Agent Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout Code Base
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js Context
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 📦 Build Local Workspace Project Structure
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @playwright/test openai @google/genai
        npx playwright install --with-deps

    # ⚙️ STEP 1: INITIAL CONFIGURATION AND SETUP
    - name: ⚙️ Step 1 Run Setup Agent
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_setup_agent.md
      env: 
        OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

    # 🏃‍♂️ STEP 2: TEST RUNNER PREPARATION
    - name: 🏃‍♂️ Step 2 Run Runner Agent
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_runner-agent.md
      env: 
        OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

    # 🔮 STEP 3: GENERATE SCRIPT SKELETONS
    - name: 🔮 Step 3 Run Scripter Agent
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_scripter.agent.md
      env: 
        OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

    # 🛠️ STEP 4: CODE ANALYSIS AND PATCH ASSERTIONS
    - name: 🛠️ Step 4 Run Fixer Agent
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_fixer.agent.md
      env: 
        OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

    # 🔍 PIPELINE DEBUGGER
    - name: 🔍 Debug Print Generated Agent File Contents
      run: |
        echo "=== START OF GENERATED FILE ==="
        cat generated_test.spec.mjs || echo "No file created yet!"
        echo "=== END OF GENERATED FILE ==="

    # 🛠️ INJECT PLAYWRIGHT EXTENSION OVERRIDE CONFIGURATION
    - name: 🏗️ Setup Playwright Matcher Engine
      run: |
        echo "import { defineConfig } from '@playwright/test';" > playwright.config.js
        echo "export default defineConfig({ testMatch: 'generated_test.spec.mjs' });" >> playwright.config.js
        echo "✅ Playwright configuration file injected successfully."

    # 🎭 STEP 5: RUN PLAYWRIGHT VERIFICATION
    - name: 🎭 Step 5 Run Playwright Native Verification Tests
      run: npx playwright test --reporter=list
