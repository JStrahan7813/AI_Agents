name: Generic Dynamic AI Agent Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code Base
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js Context
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Build Local Workspace Project Structure
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @playwright/test
        npx playwright install --with-deps

    - name: 🔮 Step 1: Execute First Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_scripter.agent.md

    - name: 🛠️ Step 2: Execute Second Sequential Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: node .github/scripts/execute-generic-agent.js .github/agents/test_fixer.agent.md

    - name: 🎭 Step 3: Run Playwright Native Verification Tests
      run: npx playwright test --reporter=list
